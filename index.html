<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/assets/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Let's find your next big night out-fast, easy, and tailored just for you.</title>
  </head>
  <body>
    <div id="root"></div>

    <!-- Hidden static form so Netlify's build bot detects the "register" form.
         The real form is rendered by React (which the bot can't see), so this
         declares the form name + fields for Netlify Forms to capture submissions. -->
    <form name="register" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="text" name="address" />
      <input type="tel" name="phone" />
      <input type="number" name="childAge" />
      <input type="text" name="gender" />
      <textarea name="comment"></textarea>
    </form>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
